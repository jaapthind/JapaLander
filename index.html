<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Descent</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #0f0; font-family: 'Courier New', Courier, monospace;
            overflow: hidden; user-select: none;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI Overlays */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .active { display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; }
        
        /* 3 Second Intro Animation */
        #intro-screen { background: #000; z-index: 100; animation: introSequence 3s forwards; }
        @keyframes introSequence {
            0% { opacity: 0; transform: scale(0.8); }
            20% { opacity: 1; transform: scale(1); }
            80% { opacity: 1; transform: scale(1); filter: blur(0px); }
            100% { opacity: 0; transform: scale(1.5); filter: blur(10px); pointer-events: none; }
        }
        #intro-screen h1 { font-size: 4rem; letter-spacing: 10px; color: #fff; text-shadow: 0 0 20px #0ff; }

        /* Menu & Selection */
        h2 { font-size: 3rem; margin-bottom: 20px; text-transform: uppercase; }
        .btn { 
            background: transparent; border: 2px solid #0f0; color: #0f0; 
            padding: 15px 40px; font-size: 1.5rem; cursor: pointer; margin: 10px;
            transition: all 0.2s ease; text-transform: uppercase; font-family: inherit;
        }
        .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
        
        #planet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 800px; }
        .planet-card {
            border: 1px solid #333; padding: 15px; text-align: center; cursor: pointer;
            transition: border-color 0.2s; background: rgba(0,20,0,0.8);
        }
        .planet-card:hover { border-color: #0ff; box-shadow: 0 0 10px rgba(0,255,255,0.5); }
        .planet-card h3 { margin: 0 0 10px 0; color: #0ff; }
        .planet-card p { margin: 5px 0; font-size: 0.8rem; color: #aaa; }

        /* HUD */
        #hud { 
            position: absolute; top: 20px; left: 20px; pointer-events: none; 
            background: rgba(0, 10, 0, 0.8); padding: 15px; border: 1px solid #0f0;
            display: none; flex-direction: column; gap: 10px; font-size: 1.2rem;
        }
        #hud-top-right {
            position: absolute; top: 20px; right: 20px; pointer-events: none;
            text-align: right; color: #888; font-size: 0.9rem;
        }
        
        .hud-warning { color: #f00 !important; font-weight: bold; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        
        <div id="intro-screen" class="screen active">
            <h1>SYSTEM BOOT</h1>
        </div>

        <div id="menu-screen" class="screen">
            <h2>Orbital Descent</h2>
            <button class="btn" id="btn-start">Start Mission</button>
        </div>

        <div id="select-screen" class="screen">
            <h2>Select Destination</h2>
            <div id="planet-grid">
                </div>
        </div>

        <div id="hud">
            <div id="hud-alt">ALTITUDE: 00000 m</div>
            <div id="hud-vel">VELOCITY: 0000.0 m/s</div>
            <div id="hud-fuel">FUEL: 100%</div>
            <div id="hud-thrust">THRUST: INACTIVE</div>
            <div id="hud-grav">GRAVITY: 0.00 m/s²</div>
        </div>
        <div id="hud-top-right">
            COMMANDER: JAAP<br>VESSEL: SEAHAWK-1
        </div>

        <div id="end-screen" class="screen">
            <h2 id="end-title">MISSION STATUS</h2>
            <p id="end-stats" style="font-size: 1.5rem; margin-bottom: 30px;"></p>
            <button class="btn" id="btn-restart">Return to Base</button>
        </div>

    </div>

<script>
/**
 * ORBITAL DESCENT - CORE ENGINE
 * Architecture: State Machine, Object-Oriented Entity Component
 */

// --- REAL WORLD PLANETARY DATA ---
const PLANET_DATA = {
    Mercury: { radius: 2439.7, gravity: 3.7, atmDensity: 0, color: '#888888', safeVelocity: 15 },
    Venus:   { radius: 6051.8, gravity: 8.87, atmDensity: 65, color: '#e0c080', safeVelocity: 10 },
    Earth:   { radius: 6371.0, gravity: 9.807, atmDensity: 1.2, color: '#2b82c9', safeVelocity: 12 },
    Mars:    { radius: 3389.5, gravity: 3.721, atmDensity: 0.02, color: '#c1440e', safeVelocity: 15 },
    Jupiter: { radius: 69911, gravity: 24.79, atmDensity: 100, color: '#d39c7e', safeVelocity: 5 }, // Gas giant, impossible landing
    Saturn:  { radius: 58232, gravity: 10.44, atmDensity: 80, color: '#ead6b8', safeVelocity: 5 },
    Uranus:  { radius: 25362, gravity: 8.69, atmDensity: 50, color: '#4b70dd', safeVelocity: 8 },
    Neptune: { radius: 24622, gravity: 11.15, atmDensity: 60, color: '#274687', safeVelocity: 8 }
};

// --- GAME ENGINE CLASSES ---
class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = this.width;
        this.canvas.height = this.height;

        this.state = 'INTRO'; // INTRO, MENU, SELECT, FLIGHT, END
        this.lastTime = 0;
        
        this.ship = new Ship();
        this.targetPlanet = null;
        this.stars = this.generateStars(200);

        this.initUI();
        this.bindEvents();
        
        // 3-second intro logic
        setTimeout(() => {
            if (this.state === 'INTRO') this.changeState('MENU');
        }, 3000);

        requestAnimationFrame((t) => this.loop(t));
    }

    initUI() {
        // Populate Planet Grid
        const grid = document.getElementById('planet-grid');
        for (const [name, data] of Object.entries(PLANET_DATA)) {
            const card = document.createElement('div');
            card.className = 'planet-card';
            card.innerHTML = `
                <h3 style="color:${data.color}">${name}</h3>
                <p>Gravity: ${data.gravity} m/s²</p>
                <p>Radius: ${data.radius} km</p>
            `;
            card.onclick = () => this.selectPlanet(name);
            grid.appendChild(card);
        }

        // Buttons
        document.getElementById('btn-start').onclick = () => this.changeState('SELECT');
        document.getElementById('btn-restart').onclick = () => this.changeState('MENU');
    }

    bindEvents() {
        window.addEventListener('resize', () => {
            this.width = window.innerWidth;
            this.height = window.innerHeight;
            this.canvas.width = this.width;
            this.canvas.height = this.height;
        });

        window.addEventListener('keydown', (e) => {
            if (this.state === 'FLIGHT') {
                if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                    this.ship.isThrusting = true;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (this.state === 'FLIGHT') {
                if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                    this.ship.isThrusting = false;
                }
            }
        });
    }

    generateStars(count) {
        let stars = [];
        for(let i=0; i<count; i++) {
            stars.push({
                x: Math.random() * this.width,
                y: Math.random() * this.height,
                size: Math.random() * 2,
                alpha: Math.random()
            });
        }
        return stars;
    }

    changeState(newState) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('hud').style.display = 'none';

        this.state = newState;

        switch(newState) {
            case 'MENU':
                document.getElementById('menu-screen').classList.add('active');
                break;
            case 'SELECT':
                document.getElementById('select-screen').classList.add('active');
                break;
            case 'FLIGHT':
                document.getElementById('hud').style.display = 'flex';
                this.ship.reset();
                break;
            case 'END':
                document.getElementById('end-screen').classList.add('active');
                this.updateEndScreen();
                break;
        }
    }

    selectPlanet(name) {
        this.targetPlanet = { name: name, ...PLANET_DATA[name] };
        this.changeState('FLIGHT');
    }

    updateEndScreen() {
        const title = document.getElementById('end-title');
        const stats = document.getElementById('end-stats');
        
        let impactVelocity = Math.abs(this.ship.velocity);
        
        if (impactVelocity <= this.targetPlanet.safeVelocity) {
            title.innerText = "SUCCESSFUL LANDING";
            title.style.color = "#0f0";
            stats.innerText = `Touchdown speed: ${impactVelocity.toFixed(1)} m/s.\nThe Seahawk-1 has landed safely on ${this.targetPlanet.name}.`;
        } else {
            title.innerText = "CATASTROPHIC CRASH";
            title.style.color = "#f00";
            stats.innerText = `Impact speed: ${impactVelocity.toFixed(1)} m/s.\nMax safe speed was ${this.targetPlanet.safeVelocity} m/s.\nThe vessel was destroyed on ${this.targetPlanet.name}.`;
        }
    }

    updateHUD() {
        const alt = document.getElementById('hud-alt');
        const vel = document.getElementById('hud-vel');
        const fuel = document.getElementById('hud-fuel');
        const thrust = document.getElementById('hud-thrust');
        const grav = document.getElementById('hud-grav');

        alt.innerText = `ALTITUDE: ${Math.max(0, Math.floor(this.ship.altitude))} m`;
        vel.innerText = `VELOCITY: ${this.ship.velocity.toFixed(2)} m/s`;
        fuel.innerText = `FUEL: ${Math.floor((this.ship.fuel / this.ship.maxFuel) * 100)}%`;
        grav.innerText = `GRAVITY: ${this.targetPlanet.gravity} m/s²`;
        
        if (this.ship.isThrusting && this.ship.fuel > 0) {
            thrust.innerText = `THRUST: ACTIVE`;
            thrust.style.color = '#0ff';
        } else {
            thrust.innerText = `THRUST: INACTIVE`;
            thrust.style.color = '#0f0';
        }

        // Warnings
        if (Math.abs(this.ship.velocity) > this.targetPlanet.safeVelocity && this.ship.altitude < 1000) {
            vel.classList.add('hud-warning');
        } else {
            vel.classList.remove('hud-warning');
        }
    }

    drawEnvironment() {
        this.ctx.clearRect(0, 0, this.width, this.height);
        
        // Stars
        this.ctx.fillStyle = '#fff';
        this.stars.forEach(star => {
            this.ctx.globalAlpha = star.alpha;
            this.ctx.fillRect(star.x, star.y, star.size, star.size);
        });
        this.ctx.globalAlpha = 1.0;

        if (this.state === 'FLIGHT' && this.targetPlanet) {
            // Planet Surface
            let surfaceY = this.height - (this.height * 0.1); // Bottom 10% is surface
            
            // Curve calculation based on altitude
            let curveStrength = Math.max(0, this.ship.altitude / 10000);
            
            this.ctx.beginPath();
            this.ctx.moveTo(0, surfaceY + (curveStrength * 200));
            this.ctx.quadraticCurveTo(this.width/2, surfaceY - (curveStrength * 500), this.width, surfaceY + (curveStrength * 200));
            this.ctx.lineTo(this.width, this.height);
            this.ctx.lineTo(0, this.height);
            this.ctx.closePath();
            
            this.ctx.fillStyle = this.targetPlanet.color;
            this.ctx.fill();
            
            // Atmosphere gradient
            if (this.targetPlanet.atmDensity > 0) {
                let grad = this.ctx.createLinearGradient(0, 0, 0, surfaceY);
                let atmColor = this.targetPlanet.color;
                grad.addColorStop(1, `${atmColor}40`); // 25% opacity
                grad.addColorStop(0, '#00000000');
                this.ctx.fillStyle = grad;
                this.ctx.fillRect(0, 0, this.width, surfaceY);
            }

            // Ship rendering
            this.ship.draw(this.ctx, this.width, surfaceY, this.targetPlanet.safeVelocity);
        }
    }

    loop(timestamp) {
        let dt = (timestamp - this.lastTime) / 1000;
        this.lastTime = timestamp;

        if (dt > 0.1) dt = 0.1; // Cap delta to prevent physics explosion on lag

        if (this.state === 'FLIGHT') {
            this.ship.update(dt, this.targetPlanet);
            this.updateHUD();
            
            if (this.ship.altitude <= 0) {
                this.ship.altitude = 0;
                this.changeState('END');
            }
        }

        this.drawEnvironment();
        requestAnimationFrame((t) => this.loop(t));
    }
}

// --- PHYSICS ENTITY ---
class Ship {
    constructor() {
        this.maxFuel = 5000;
        this.enginePower = 30.0; 
        this.reset();
    }

    reset() {
        this.altitude = 15000; // Starting altitude (meters)
        this.velocity = -50;    // Initial descent velocity
        this.fuel = this.maxFuel;
        this.isThrusting = false;
        this.mass = 2000;
    }

    update(dt, planet) {
        // Apply Physics
        let gravityForce = planet.gravity;
        
        // Simple Drag = 1/2 * p * v^2 * Cd * A
        // Simplified for gameplay based on atm density
        let dragForce = 0;
        if (planet.atmDensity > 0) {
            let speedSq = this.velocity * this.velocity;
            let direction = this.velocity > 0 ? -1 : 1;
            dragForce = direction * (0.0001 * planet.atmDensity * speedSq);
        }

        let acceleration = -gravityForce + dragForce;

        if (this.isThrusting && this.fuel > 0) {
            acceleration += this.enginePower;
            this.fuel -= 250 * dt; // Fuel burn rate
            if (this.fuel < 0) this.fuel = 0;
        }

        this.velocity += acceleration * dt;
        this.altitude += this.velocity * dt;
    }

    draw(ctx, screenWidth, surfaceY, safeSpeed) {
        // Map altitude to screen Y
        // 15000m top, 0m surfaceY
        let renderY = surfaceY - (this.altitude / 15000) * (surfaceY - 50);
        let renderX = screenWidth / 2;

        ctx.save();
        ctx.translate(renderX, renderY);

        // Draw Ship Body
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(0, -15);
        ctx.lineTo(10, 10);
        ctx.lineTo(-10, 10);
        ctx.closePath();
        ctx.fill();
        
        // Draw Legs
        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(10, 10); ctx.lineTo(15, 20);
        ctx.moveTo(-10, 10); ctx.lineTo(-15, 20);
        ctx.stroke();

        // Draw Thrust Flame
        if (this.isThrusting && this.fuel > 0) {
            ctx.fillStyle = '#0ff';
            ctx.beginPath();
            ctx.moveTo(-5, 10);
            ctx.lineTo(5, 10);
            ctx.lineTo(0, 10 + Math.random() * 20 + 10); // Flickering flame
            ctx.closePath();
            ctx.fill();
        }

        // Velocity Vector Line
        if (Math.abs(this.velocity) > safeSpeed) {
            ctx.strokeStyle = '#f00';
        } else {
            ctx.strokeStyle = '#0f0';
        }
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(0, -this.velocity * 0.5); // Visual multiplier
        ctx.stroke();

        ctx.restore();
    }
}

// Initialize the game
window.onload = () => {
    const game = new Game();
};
</script>
</body>
</html>
