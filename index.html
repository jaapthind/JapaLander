<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SLOPE CLONE - PURE ENGINE</title>
<style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }

    </div>

<script>
/**
 * PURE SLOPE ENGINE 
 * Custom Physics, Procedural Generation, Shader Graphing, Audio Synthesis
 */

// ==========================================
// CONSTANTS & CONFIGURATION
// ==========================================
const CONFIG = {
    BALL_RADIUS: 1,
    GRAVITY: -50,
    BASE_SPEED: 40,
    MAX_SPEED: 120,
    SPEED_INC: 0.5,
    STEER_SPEED: 25,
    TRACK_WIDTH: 20,
    CHUNK_LENGTH: 100,
    COLORS: {
        BG: 0x000000,
        BALL: 0x00ff00,
        TRACK: 0x111111,
        GRID: 0x00ff00,
        OBSTACLE: 0xff0000,
        OBSTACLE_GRID: 0xffaaaa
    }
};

// ==========================================
// AUDIO SYNTHESIS ENGINE (No Assets)
// ==========================================
class AudioEngine {
    constructor() {
        this.ctx = null;
        this.master = null;
        this.initialized = false;
        this.bgmOsc1 = null;
        this.bgmOsc2 = null;
        this.bgmGain = null;
        this.isPlayingBGM = false;
    }

    init() {
        if (this.initialized) return;
        try {
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AudioContext();
            this.master = this.ctx.createGain();
            this.master.gain.value = 0.5;
            
            const compressor = this.ctx.createDynamicsCompressor();
            compressor.threshold.value = -24;
            compressor.knee.value = 30;
            compressor.ratio.value = 12;
            compressor.attack.value = 0.003;
            compressor.release.value = 0.25;
            
            this.master.connect(compressor);
            compressor.connect(this.ctx.destination);
            this.initialized = true;
        } catch(e) { console.warn("WebAudio API not supported"); }
    }

    playTone(freq, type, duration, vol=1.0, slideFreq=null) {
        if (!this.initialized || this.ctx.state === 'suspended') return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        if (slideFreq) {
            osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
        }
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.master);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }

    playNoise(duration, vol=1.0) {
        if (!this.initialized || this.ctx.state === 'suspended') return;
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1000;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.master);
        noise.start();
    }

    startBGM() {
        if (!this.initialized) this.init();
        if (this.isPlayingBGM) return;
        
        this.bgmOsc1 = this.ctx.createOscillator();
        this.bgmOsc2 = this.ctx.createOscillator();
        this.bgmGain = this.ctx.createGain();
        
        this.bgmOsc1.type = 'square';
        this.bgmOsc2.type = 'sawtooth';
        
        this.bgmOsc1.frequency.value = 55; // Low A
        this.bgmOsc2.frequency.value = 110; // A
        
        // Setup a pulsing LFO for the tempo
        const lfo = this.ctx.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = 2.5; // Pulse speed
        const lfoGain = this.ctx.createGain();
        lfoGain.gain.value = 0.5;
        lfo.connect(lfoGain);
        lfoGain.connect(this.bgmGain.gain);
        
        this.bgmGain.gain.value = 0.3;
        
        this.bgmOsc1.connect(this.bgmGain);
        this.bgmOsc2.connect(this.bgmGain);
        this.bgmGain.connect(this.master);
        
        this.bgmOsc1.start();
        this.bgmOsc2.start();
        lfo.start();
        this.isPlayingBGM = true;
    }

    stopBGM() {
        if (!this.isPlayingBGM) return;
        this.bgmGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.5);
        setTimeout(() => {
            if(this.bgmOsc1) this.bgmOsc1.stop();
            if(this.bgmOsc2) this.bgmOsc2.stop();
            this.isPlayingBGM = false;
        }, 500);
    }

    sfxJump() { this.playTone(200, 'sine', 0.3, 0.5, 600); }
    sfxCrash() { 
        this.playNoise(0.8, 1.0); 
        this.playTone(100, 'sawtooth', 0.8, 0.8, 20); 
    }
    sfxScore() { this.playTone(800, 'square', 0.1, 0.3); setTimeout(() => this.playTone(1200, 'square', 0.1, 0.3), 100); }
}
const audio = new AudioEngine();

// ==========================================
// INPUT MANAGER
// ==========================================
class InputManager {
    constructor() {
        this.keys = { left: false, right: false };
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') this.keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') this.keys.right = true;
            audio.init();
        });
        
        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') this.keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') this.keys.right = false;
        });

        // Mobile Controls
        const tLeft = document.getElementById('touch-left');
        const tRight = document.getElementById('touch-right');
        
        const handleTouch = (el, key, state) => {
            el.addEventListener('touchstart', (e) => { e.preventDefault(); this.keys[key] = state; audio.init(); });
            el.addEventListener('touchend', (e) => { e.preventDefault(); this.keys[key] = !state; });
            el.addEventListener('touchcancel', (e) => { e.preventDefault(); this.keys[key] = !state; });
        };
        
        handleTouch(tLeft, 'left', true);
        handleTouch(tRight, 'right', true);
    }

    getAxis() {
        let axis = 0;
        if (this.keys.left) axis += 1; // Movement is positive X for left based on camera setup
        if (this.keys.right) axis -= 1;
        return axis;
    }
}
const input = new InputManager();

// ==========================================
// CUSTOM SHADERS (Neon Grid Effect)
// ==========================================
const gridVertexShader = `
    varying vec2 vUv;
    varying vec3 vWorldPosition;
    void main() {
        vUv = uv;
        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPosition.xyz;
        gl_Position = projectionMatrix * viewMatrix * worldPosition;
    }
`;

const gridFragmentShader = `
    uniform vec3 color;
    uniform vec3 gridColor;
    uniform float gridSize;
    uniform float gridThickness;
    
    varying vec2 vUv;
    varying vec3 vWorldPosition;

    void main() {
        // Use world position for seamless grid across chunks
        vec2 gridPos = vWorldPosition.xz / gridSize;
        vec2 grid = abs(fract(gridPos - 0.5) - 0.5) / fwidth(gridPos);
        float line = min(grid.x, grid.y);
        
        // Anti-aliased lines
        float lineAlpha = 1.0 - smoothstep(0.0, gridThickness, line);
        
        // Edge highlighting based on local UVs (to highlight borders of blocks)
        vec2 edge = abs(vUv - 0.5) * 2.0;
        float edgeAlpha = max(smoothstep(0.95, 1.0, edge.x), smoothstep(0.95, 1.0, edge.y));
        
        float finalAlpha = max(lineAlpha * 0.5, edgeAlpha);
        
        vec3 finalColor = mix(color, gridColor, finalAlpha);
        gl_FragColor = vec4(finalColor, 1.0);
    }
`;

function createGridMaterial(baseColor, glowColor) {
    return new THREE.ShaderMaterial({
        vertexShader: gridVertexShader,
        fragmentShader: gridFragmentShader,
        uniforms: {
            color: { value: new THREE.Color(baseColor) },
            gridColor: { value: new THREE.Color(glowColor) },
            gridSize: { value: 2.0 },
            gridThickness: { value: 1.5 }
        }
    });
}

// ==========================================
// PROCEDURAL LEVEL GENERATION
// ==========================================
class Chunk {
    constructor(scene, startZ, type, params) {
        this.scene = scene;
        this.startZ = startZ;
        this.endZ = startZ - CONFIG.CHUNK_LENGTH;
        this.type = type;
        this.params = params;
        this.meshes = [];
        this.colliders = []; // Custom AABB/Planes for physics
        this.build();
    }

    addMesh(geometry, material, x, y, z, rotX=0, rotY=0, rotZ=0) {
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(x, y, z);
        mesh.rotation.set(rotX, rotY, rotZ);
        this.scene.add(mesh);
        this.meshes.push(mesh);
        return mesh;
    }

    addCollider(mesh, type, isHazard=false) {
        mesh.updateMatrixWorld();
        const box = new THREE.Box3().setFromObject(mesh);
        this.colliders.push({ box: box, mesh: mesh, type: type, isHazard: isHazard });
    }

    build() {
        const matTrack = createGridMaterial(CONFIG.COLORS.TRACK, CONFIG.COLORS.GRID);
        const matObstacle = createGridMaterial(0x220000, CONFIG.COLORS.OBSTACLE_GRID);
        
        // Base track
        let w = CONFIG.TRACK_WIDTH;
        let l = CONFIG.CHUNK_LENGTH;
        
        let geo = new THREE.BoxGeometry(w, 2, l);
        
        let trackMesh = this.addMesh(geo, matTrack, 0, -1, this.startZ - l/2);
        this.addCollider(trackMesh, 'floor');

        // Side walls (to prevent falling off entirely immediately, slopes inward)
        let wallGeo = new THREE.BoxGeometry(2, 6, l);
        let leftWall = this.addMesh(wallGeo, matTrack, w/2 + 1, 2, this.startZ - l/2);
        let rightWall = this.addMesh(wallGeo, matTrack, -w/2 - 1, 2, this.startZ - l/2);
        this.addCollider(leftWall, 'wall');
        this.addCollider(rightWall, 'wall');

        // Obstacles based on type
        if (this.type === 'normal') {
            // Random blocks
            let numBlocks = Math.floor(Math.random() * 3);
            for(let i=0; i<numBlocks; i++) {
                let bw = Math.random() * (w/2) + 2;
                let bx = (Math.random() - 0.5) * (w - bw);
                let bz = this.startZ - 20 - Math.random() * (l - 40);
                
                let blockGeo = new THREE.BoxGeometry(bw, 4, 2);
                let block = this.addMesh(blockGeo, matObstacle, bx, 2, bz);
                this.addCollider(block, 'obstacle', true);
            }
        } else if (this.type === 'tunnel') {
            // Moving blocks
            let blockGeo = new THREE.BoxGeometry(w/2, 4, 2);
            let block = this.addMesh(blockGeo, matObstacle, 0, 2, this.startZ - l/2);
            
            // Tag for movement in update loop
            block.userData = { 
                moving: true, 
                dir: Math.random() > 0.5 ? 1 : -1, 
                speed: Math.random() * 10 + 5,
                bound: w/2 - w/4 
            };
            this.addCollider(block, 'obstacle', true);
        } else if (this.type === 'gap') {
            // Remove floor, replace with small jump
            this.scene.remove(trackMesh);
            this.meshes = this.meshes.filter(m => m !== trackMesh);
            this.colliders = this.colliders.filter(c => c.mesh !== trackMesh);
            
            let p1L = 30;
            let p2L = 30;
            let gapGeo1 = new THREE.BoxGeometry(w, 2, p1L);
            let gapGeo2 = new THREE.BoxGeometry(w, 2, p2L);
            
            let p1 = this.addMesh(gapGeo1, matTrack, 0, -1, this.startZ - p1L/2);
            let p2 = this.addMesh(gapGeo2, matTrack, 0, -5, this.startZ - l + p2L/2); // Lower landing
            
            this.addCollider(p1, 'floor');
            this.addCollider(p2, 'floor');
        }
    }

    update(dt) {
        // Move obstacles
        for(let c of this.colliders) {
            if(c.mesh.userData && c.mesh.userData.moving) {
                let m = c.mesh;
                m.position.x += m.userData.dir * m.userData.speed * dt;
                if (Math.abs(m.position.x) > m.userData.bound) {
                    m.userData.dir *= -1;
                    m.position.x = Math.sign(m.position.x) * m.userData.bound;
                }
                c.box.setFromObject(m); // Update physics AABB
            }
        }
    }

    destroy() {
        for(let m of this.meshes) {
            m.geometry.dispose();
            this.scene.remove(m);
        }
    }
}

class LevelManager {
    constructor(scene) {
        this.scene = scene;
        this.chunks = [];
        this.lastZ = 0;
        this.chunkTypes = ['normal', 'normal', 'tunnel', 'normal', 'gap'];
    }

    reset() {
        for(let c of this.chunks) c.destroy();
        this.chunks = [];
        this.lastZ = 10;
        
        // Initial safe zone
        this.addChunk('safe');
        for(let i=0; i<5; i++) this.addChunk();
    }

    addChunk(forcedType = null) {
        let type = forcedType;
        if (!type) {
            type = this.chunkTypes[Math.floor(Math.random() * this.chunkTypes.length)];
        }
        let chunk = new Chunk(this.scene, this.lastZ, type, {});
        this.chunks.push(chunk);
        this.lastZ -= CONFIG.CHUNK_LENGTH;
    }

    update(playerZ, dt) {
        // Update logic (moving blocks)
        for(let c of this.chunks) c.update(dt);

        // Garbage collection and generation
        if (this.chunks.length > 0 && playerZ < this.chunks[0].endZ - 50) {
            this.chunks[0].destroy();
            this.chunks.shift();
            this.addChunk();
        }
    }

    getColliders() {
        let all = [];
        for(let c of this.chunks) all.push(...c.colliders);
        return all;
    }
}

// ==========================================
// PLAYER / PHYSICS ENGINE
// ==========================================
class Player {
    constructor(scene) {
        this.scene = scene;
        this.radius = CONFIG.BALL_RADIUS;
        
        const geo = new THREE.IcosahedronGeometry(this.radius, 2);
        const mat = new THREE.MeshBasicMaterial({ color: CONFIG.COLORS.BALL, wireframe: true });
        this.mesh = new THREE.Mesh(geo, mat);
        
        // Inner solid core
        const coreGeo = new THREE.SphereGeometry(this.radius * 0.9, 16, 16);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0x005500 });
        this.core = new THREE.Mesh(coreGeo, coreMat);
        this.mesh.add(this.core);
        
        this.scene.add(this.mesh);
        this.reset();
    }

    reset() {
        this.pos = new THREE.Vector3(0, 10, 0); // Drop in
        this.vel = new THREE.Vector3(0, 0, 0);
        this.speed = CONFIG.BASE_SPEED;
        this.mesh.position.copy(this.pos);
        this.mesh.rotation.set(0,0,0);
        this.isGrounded = false;
        this.dead = false;
    }

    update(dt, colliders) {
        if (this.dead) return;

        // Increase speed over time
        this.speed += CONFIG.SPEED_INC * dt;
        if (this.speed > CONFIG.MAX_SPEED) this.speed = CONFIG.MAX_SPEED;

        // Apply Input
        let steer = input.getAxis();
        this.vel.x = steer * CONFIG.STEER_SPEED;
        this.vel.z = -this.speed;

        // Apply Gravity
        this.vel.y += CONFIG.GRAVITY * dt;

        // Store next position
        let nextPos = this.pos.clone().add(this.vel.clone().multiplyScalar(dt));

        // Physics Resolution (Sphere vs AABB)
        this.isGrounded = false;
        
        // Broadphase: Filter nearby colliders
        let nearby = colliders.filter(c => {
            return c.box.distanceToPoint(this.pos) < this.radius * 3;
        });

        for(let c of nearby) {
            let box = c.box;
            
            // Find closest point on AABB to sphere center
            let closestPoint = new THREE.Vector3(
                Math.max(box.min.x, Math.min(nextPos.x, box.max.x)),
                Math.max(box.min.y, Math.min(nextPos.y, box.max.y)),
                Math.max(box.min.z, Math.min(nextPos.z, box.max.z))
            );

            let distSq = closestPoint.distanceToSquared(nextPos);
            
            if (distSq < this.radius * this.radius) {
                // Collision occurred!
                if (c.isHazard) {
                    this.die();
                    return;
                }

                let dist = Math.sqrt(distSq);
                let normal = new THREE.Vector3().subVectors(nextPos, closestPoint);
                
                // If sphere center is inside box, normal is zero. Extrude up.
                if (dist === 0) {
                    normal.set(0, 1, 0);
                    dist = 0.001;
                } else {
                    normal.normalize();
                }

                // Push out
                let penetration = this.radius - dist;
                nextPos.add(normal.clone().multiplyScalar(penetration));

                // Adjust velocity along normal
                let velAlongNormal = this.vel.dot(normal);
                if (velAlongNormal < 0) {
                    this.vel.sub(normal.clone().multiplyScalar(velAlongNormal));
                    if (normal.y > 0.5) {
                        this.isGrounded = true;
                    }
                }
            }
        }

        this.pos.copy(nextPos);
        this.mesh.position.copy(this.pos);

        // Roll rotation (Visual only)
        if (this.isGrounded) {
            let rollAxis = new THREE.Vector3(-this.vel.z, 0, this.vel.x).normalize();
            let rollAngle = (this.speed * dt) / this.radius;
            this.mesh.rotateOnWorldAxis(rollAxis, rollAngle);
        }

        // Death by falling
        if (this.pos.y < -20) {
            this.die();
        }
    }

    die() {
        this.dead = true;
        audio.sfxCrash();
    }
}

// ==========================================
// PARTICLE SYSTEM (Death Explosion)
// ==========================================
class ParticleSystem {
    constructor(scene) {
        this.scene = scene;
        this.particles = [];
        this.geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        this.mat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
    }

    explode(pos) {
        for(let i=0; i<50; i++) {
            let mesh = new THREE.Mesh(this.geo, this.mat);
            mesh.position.copy(pos);
            let vel = new THREE.Vector3(
                (Math.random() - 0.5) * 40,
                Math.random() * 40 + 10,
                (Math.random() - 0.5) * 40
            );
            this.scene.add(mesh);
            this.particles.push({ mesh: mesh, vel: vel, life: 1.0 });
        }
    }

    update(dt) {
        for(let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i];
            p.vel.y += CONFIG.GRAVITY * dt;
            p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
            p.mesh.rotation.x += p.vel.x * 0.1 * dt;
            p.mesh.rotation.y += p.vel.y * 0.1 * dt;
            p.life -= dt * 0.5;
            p.mesh.scale.setScalar(Math.max(0, p.life));
            
            if (p.life <= 0) {
                this.scene.remove(p.mesh);
                this.particles.splice(i, 1);
            }
        }
    }
}

// ==========================================
// MAIN GAME ENGINE & LOOP
// ==========================================
class GameEngine {
    constructor() {
        this.container = document.getElementById('game-container');
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(CONFIG.COLORS.BG, 0.005);
        
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setClearColor(CONFIG.COLORS.BG);
        this.container.appendChild(this.renderer.domElement);

        this.levelManager = new LevelManager(this.scene);
        this.player = new Player(this.scene);
        this.particles = new ParticleSystem(this.scene);

        this.clock = new THREE.Clock();
        this.state = 'MENU'; // MENU, PLAYING, GAMEOVER
        this.score = 0;
        this.highScore = parseInt(localStorage.getItem('slopeHighScore')) || 0;
        document.getElementById('high-score').innerText = this.highScore;

        window.addEventListener('resize', () => this.onWindowResize(), false);

        this.setupUI();
        this.animate();
    }

    setupUI() {
        document.getElementById('btn-start').addEventListener('click', () => this.startGame());
        document.getElementById('btn-restart').addEventListener('click', () => this.startGame());
    }

    showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if (id) document.getElementById(id).classList.add('active');
        document.getElementById('hud').style.display = (id === null) ? 'flex' : 'none';
    }

    startGame() {
        audio.init();
        audio.startBGM();
        this.levelManager.reset();
        this.player.reset();
        this.score = 0;
        this.updateScoreDisplay();
        this.state = 'PLAYING';
        this.showScreen(null);
    }

    gameOver() {
        this.state = 'GAMEOVER';
        audio.stopBGM();
        this.particles.explode(this.player.pos);
        this.player.mesh.visible = false;
        
        if (this.score > this.highScore) {
            this.highScore = this.score;
            localStorage.setItem('slopeHighScore', this.highScore);
        }
        
        document.getElementById('final-score').innerText = this.score;
        document.getElementById('high-score').innerText = this.highScore;
        setTimeout(() => this.showScreen('game-over'), 1000);
    }

    updateScoreDisplay() {
        document.getElementById('score').innerText = this.score;
    }

    onWindowResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
    }

    animate() {
        requestAnimationFrame(() => this.animate());

        let dt = this.clock.getDelta();
        if (dt > 0.1) dt = 0.1; // Cap dt

        if (this.state === 'PLAYING') {
            this.levelManager.update(this.player.pos.z, dt);
            this.player.update(dt, this.levelManager.getColliders());
            
            // Camera follow
            let targetCamPos = this.player.pos.clone().add(new THREE.Vector3(0, 10, 15));
            this.camera.position.lerp(targetCamPos, 0.1);
            
            let lookAtTarget = this.player.pos.clone().add(new THREE.Vector3(0, 0, -20));
            
            // Dynamic FOV based on speed
            let targetFov = 75 + (this.player.speed - CONFIG.BASE_SPEED) * 0.2;
            this.camera.fov += (targetFov - this.camera.fov) * 0.1;
            this.camera.updateProjectionMatrix();

            this.camera.lookAt(lookAtTarget);

            // Score logic (based on distance)
            let currentScore = Math.floor(-this.player.pos.z / 10);
            if (currentScore > this.score && currentScore % 10 === 0) {
                // Occasional beep for points
                if(currentScore % 100 === 0) audio.sfxScore();
            }
            this.score = Math.max(this.score, currentScore);
            this.updateScoreDisplay();

            if (this.player.dead) {
                this.gameOver();
            }
        } else if (this.state === 'GAMEOVER') {
            this.particles.update(dt);
            // Slowly pan camera down
            this.camera.position.y -= 5 * dt;
            this.camera.lookAt(this.player.pos);
        } else if (this.state === 'MENU') {
            // Idle camera rotation
            let time = Date.now() * 0.001;
            this.camera.position.set(Math.sin(time)*20, 15, Math.cos(time)*20);
            this.camera.lookAt(0,0,0);
        }

        this.renderer.render(this.scene, this.camera);
    }
}

// Bootstrap
window.onload = () => {
    const game = new GameEngine();
};
</script>
