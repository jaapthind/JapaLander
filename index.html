<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUNAR LANDER</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        /* CRT Glow Effect */
        .crt {
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            z-index: 10;
        }
        .scanlines {
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            z-index: 11;
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div class="crt"></div>
    <div class="scanlines"></div>

<script>
/**
 * VECTOR ARCADE ENGINE v1.0
 * Pure Canvas 2D Wireframe Implementation
 * Zero External Dependencies
 */

// ============================================================================
// ENGINE CONSTANTS & CONFIG
// ============================================================================
const CONFIG = {
    FPS: 60,
    PHYSICS_TIMESTEP: 1000 / 60,
    MAX_FRAME_TIME: 250,
    VECTOR_THICKNESS: 1.5,
    GLOW_INTENSITY: 5,
    COLOR_DRAW: '#eeeeee',
    COLOR_BG: '#000000',
    COLOR_PAD: '#ffffff',
    COLOR_TEXT: '#dddddd',
    GRAVITY: 0.012,
    THRUST_POWER: 0.035,
    ROTATION_SPEED: 0.045,
    FUEL_CONSUMPTION: 0.5,
    MAX_SAFE_LANDING_SPEED: 1.5,
    MAX_SAFE_LANDING_ANGLE: 0.1,
    SCALE_FACTOR: 1.0,
    VIEWPORT_WIDTH: 1000,
    VIEWPORT_HEIGHT: 700
};

// ============================================================================
// VECTOR MATH LIBRARY
// ============================================================================
class Vec2 {
    constructor(x = 0, y = 0) { this.x = x; this.y = y; }
    set(x, y) { this.x = x; this.y = y; return this; }
    copy() { return new Vec2(this.x, this.y); }
    add(v) { this.x += v.x; this.y += v.y; return this; }
    addScaled(v, s) { this.x += v.x * s; this.y += v.y * s; return this; }
    sub(v) { this.x -= v.x; this.y -= v.y; return this; }
    mult(s) { this.x *= s; this.y *= s; return this; }
    div(s) { if(s!==0){this.x /= s; this.y /= s;} return this; }
    magSq() { return this.x * this.x + this.y * this.y; }
    mag() { return Math.sqrt(this.magSq()); }
    normalize() { let m = this.mag(); if(m>0) this.div(m); return this; }
    dot(v) { return this.x * v.x + this.y * v.y; }
    cross(v) { return this.x * v.y - this.y * v.x; }
    dist(v) { let dx = this.x - v.x, dy = this.y - v.y; return Math.sqrt(dx*dx + dy*dy); }
    rotate(angle) {
        let c = Math.cos(angle), s = Math.sin(angle);
        let nx = this.x * c - this.y * s;
        let ny = this.x * s + this.y * c;
        this.x = nx; this.y = ny;
        return this;
    }
}

const MathUtils = {
    rand: (min, max) => Math.random() * (max - min) + min,
    randInt: (min, max) => Math.floor(Math.random() * (max - min + 1)) + min,
    clamp: (val, min, max) => Math.max(min, Math.min(max, val)),
    lerp: (a, b, t) => a + (b - a) * t,
    padZero: (num, size) => { let s = num+""; while (s.length < size) s = "0" + s; return s; }
};

// ============================================================================
// VECTOR ROM FONT (Authentic Arcade Line Data)
// ============================================================================
// Format: Array of line segments [ [x1,y1, x2,y2], ... ] based on a 10x14 grid
const VECTOR_FONT = {
    '0': [[0,0,10,0],[10,0,10,14],[10,14,0,14],[0,14,0,0],[10,0,0,14]],
    '1': [[5,0,5,14],[3,4,5,0],[2,14,8,14]],
    '2': [[0,0,10,0],[10,0,10,7],[10,7,0,7],[0,7,0,14],[0,14,10,14]],
    '3': [[0,0,10,0],[10,0,10,14],[10,14,0,14],[0,7,10,7]],
    '4': [[0,0,0,7],[0,7,10,7],[10,0,10,14]],
    '5': [[10,0,0,0],[0,0,0,7],[0,7,10,7],[10,7,10,14],[10,14,0,14]],
    '6': [[10,0,0,0],[0,0,0,14],[0,14,10,14],[10,14,10,7],[10,7,0,7]],

    'A': [[0,14,0,4],[0,4,5,0],[5,0,10,4],[10,4,10,14],[0,8,10,8]],
    'B': [[0,0,8,0],[8,0,10,3],[10,3,10,4],[10,4,8,7],[8,7,0,7],[8,7,10,10],[10,10,10,11],[10,11,8,14],[8,14,0,14],[0,14,0,0]],
    'C': [[10,0,0,0],[0,0,0,14],[0,14,10,14]],
    'D': [[0,0,7,0],[7,0,10,3],[10,3,10,11],[10,11,7,14],[7,14,0,14],[0,14,0,0]],
    'E': [[10,0,0,0],[0,0,0,14],[0,14,10,14],[0,7,8,7]],
    'F': [[10,0,0,0],[0,0,0,14],[0,7,8,7]],
    'G': [[10,0,0,0],[0,0,0,14],[0,14,10,14],[10,14,10,7],[10,7,5,7]],
    'H': [[0,0,0,14],[10,0,10,14],[0,7,10,7]],

    'K': [[0,0,0,14],[10,0,0,7],[0,7,10,14]],

    'M': [[0,14,0,0],[0,0,5,7],[5,7,10,0],[10,0,10,14]],

    '.': [[4,14,6,14],[6,14,6,12],[6,12,4,12],[4,12,4,14]],
    '-': [[2,7,8,7]],
    ':': [[4,4,6,4],[6,4,6,6],[6,6,4,6],[4,6,4,4], [4,10,6,10],[6,10,6,12],[6,12,4,12],[4,12,4,10]]

class VectorRenderer {
    constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        this.width = 0;
        this.height = 0;
        this.resize();
        window.addEventListener('resize', () => this.resize());
    }

    resize() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        // Calculate scaling to keep aspect ratio authentic
        let scaleX = this.width / CONFIG.VIEWPORT_WIDTH;
        let scaleY = this.height / CONFIG.VIEWPORT_HEIGHT;
        CONFIG.SCALE_FACTOR = Math.min(scaleX, scaleY);
    }

    clear() {
        this.ctx.fillStyle = CONFIG.COLOR_BG;
        this.ctx.fillRect(0, 0, this.width, this.height);
    }

    begin() {
        this.ctx.save();
        // Center the viewport
        let offsetX = (this.width - (CONFIG.VIEWPORT_WIDTH * CONFIG.SCALE_FACTOR)) / 2;
        let offsetY = (this.height - (CONFIG.VIEWPORT_HEIGHT * CONFIG.SCALE_FACTOR)) / 2;
        this.ctx.translate(offsetX, offsetY);
        this.ctx.scale(CONFIG.SCALE_FACTOR, CONFIG.SCALE_FACTOR);
        
        // Setup CRT Vector Line Style
        this.ctx.strokeStyle = CONFIG.COLOR_DRAW;
        this.ctx.lineWidth = CONFIG.VECTOR_THICKNESS;
        this.ctx.lineCap = 'round';
        this.ctx.lineJoin = 'round';
        this.ctx.shadowBlur = CONFIG.GLOW_INTENSITY;
        this.ctx.shadowColor = CONFIG.COLOR_DRAW;
    }

    end() {
        this.ctx.restore();
    }

    drawLine(x1, y1, x2, y2) {
        this.ctx.beginPath();
        this.ctx.moveTo(x1, y1);
        this.ctx.lineTo(x2, y2);
        this.ctx.stroke();
    }

    drawPoly(pts, closed = false) {
        if(pts.length < 2) return;
        this.ctx.beginPath();
        this.ctx.moveTo(pts[0].x, pts[0].y);
        for(let i=1; i<pts.length; i++) {
            this.ctx.lineTo(pts[i].x, pts[i].y);
        }
        if(closed) this.ctx.closePath();
        this.ctx.stroke();
    }

    drawText(str, x, y, scale = 1, align = 'left') {
        const charWidth = 10 * scale;
        const charSpacing = 4 * scale;
        let totalWidth = 0;
        
        if (align === 'right') {
            totalWidth = (str.length * charWidth) + ((str.length - 1) * charSpacing);
            x -= totalWidth;
        } else if (align === 'center') {
            totalWidth = (str.length * charWidth) + ((str.length - 1) * charSpacing);
            x -= totalWidth / 2;
        }

        this.ctx.beginPath();
        for (let i = 0; i < str.length; i++) {
            let char = str[i].toUpperCase();
            let data = VECTOR_FONT[char];
            if (data) {
                let cx = x + (i * (charWidth + charSpacing));
                for (let j = 0; j < data.length; j++) {
                    let line = data[j];
                    this.ctx.moveTo(cx + line[0] * scale, y + line[1] * scale);
                    this.ctx.lineTo(cx + line[2] * scale, y + line[3] * scale);
                }
            }
        }
        this.ctx.stroke();
    }
    
    drawDot(x, y) {
        this.ctx.fillStyle = CONFIG.COLOR_DRAW;
        this.ctx.fillRect(x - 1, y - 1, 2, 2);
    }
}

// ============================================================================
// AUDIO SYNTHESIZER (Pure WebAudio API)
// ============================================================================
class AudioEngine {
    constructor() {
        this.ctx = null;
        this.master = null;
        this.initialized = false;
        this.thrustOsc = null;
        this.thrustGain = null;
    }

    init() {
        if(this.initialized) return;
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AudioContext();
            this.master = this.ctx.createGain();
            this.master.gain.value = 0.3;
            
            // Retro compression
            const comp = this.ctx.createDynamicsCompressor();
            comp.threshold.value = -20;
            comp.knee.value = 10;
            comp.ratio.value = 12;
            comp.attack.value = 0;
            comp.release.value = 0.25;
            
            this.master.connect(comp);
            comp.connect(this.ctx.destination);
            this.initialized = true;
        } catch(e) {}
    }

    playTone(freq, type, duration, vol=1.0) {
        if(!this.initialized || this.ctx.state === 'suspended') return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.master);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }

    playNoise(duration, vol=1.0, lowpassFreq=1000) {
        if(!this.initialized || this.ctx.state === 'suspended') return;
        let bufferSize = this.ctx.sampleRate * duration;
        let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        let noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        let filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = lowpassFreq;
        let gain = this.ctx.createGain();
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.master);
        noise.start();
    }

    startThrust() {
        if(!this.initialized || this.thrustOsc) return;
        this.thrustOsc = this.ctx.createOscillator();
        this.thrustOsc.type = 'sawtooth';
        this.thrustOsc.frequency.value = 40;
        this.thrustGain = this.ctx.createGain();
        this.thrustGain.gain.value = 0;
        
        let filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 300;
        
        this.thrustOsc.connect(filter);
        filter.connect(this.thrustGain);
        this.thrustGain.connect(this.master);
        
        this.thrustOsc.start();
        this.thrustGain.gain.setTargetAtTime(0.8, this.ctx.currentTime, 0.05);
    }

    stopThrust() {
        if(!this.thrustOsc) return;
        this.thrustGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.05);
        setTimeout(() => {
            if(this.thrustOsc) {
                this.thrustOsc.stop();
                this.thrustOsc.disconnect();
                this.thrustOsc = null;
            }
        }, 100);
    }

    sfxThrust() { this.playNoise(0.1, 0.2, 400); }
    sfxCrash() { 
        this.playNoise(1.5, 1.0, 800); 
        this.playTone(50, 'square', 1.0, 0.8);
        this.playTone(30, 'sawtooth', 1.5, 1.0);
    }
    sfxLand() { 
        this.playTone(400, 'sine', 0.2, 0.3);
        setTimeout(()=>this.playTone(600, 'sine', 0.4, 0.3), 150);
    }
    sfxAlert() { this.playTone(800, 'square', 0.1, 0.2); }
    sfxScore() { this.playTone(1200, 'square', 0.05, 0.1); }
}

// ============================================================================
// INPUT HANDLING
// ============================================================================
class Input {
    constructor() {
        this.keys = {};
        this.mapped = { up: false, left: false, right: false, start: false };
        
        window.addEventListener('keydown', e => {
            this.keys[e.code] = true;
            this.updateMap();
            audio.init();
        });
        window.addEventListener('keyup', e => {
            this.keys[e.code] = false;
            this.updateMap();
        });
        
        // Touch controls
        window.addEventListener('touchstart', e => {
            audio.init();
            for(let i=0; i<e.touches.length; i++) {
                let t = e.touches[i];
                if(t.clientY < window.innerHeight/2) this.mapped.start = true;
                if(t.clientY > window.innerHeight/2) {
                    if(t.clientX < window.innerWidth/3) this.mapped.left = true;
                    else if(t.clientX > window.innerWidth*2/3) this.mapped.right = true;
                    else this.mapped.up = true;
                }
            }
        });
        window.addEventListener('touchend', e => {
            this.mapped.up = this.mapped.left = this.mapped.right = this.mapped.start = false;
            for(let i=0; i<e.touches.length; i++) {
                let t = e.touches[i];
                if(t.clientY < window.innerHeight/2) this.mapped.start = true;
                if(t.clientY > window.innerHeight/2) {
                    if(t.clientX < window.innerWidth/3) this.mapped.left = true;
                    else if(t.clientX > window.innerWidth*2/3) this.mapped.right = true;
                    else this.mapped.up = true;
                }
            }
        });
    }
    
    updateMap() {
        this.mapped.up = this.keys['ArrowUp'] || this.keys['KeyW'] || this.keys['Space'];
        this.mapped.left = this.keys['ArrowLeft'] || this.keys['KeyA'];
        this.mapped.right = this.keys['ArrowRight'] || this.keys['KeyD'];
        this.mapped.start = this.keys['Enter'] || this.keys['Space'];
    }
}

// ============================================================================
// PHYSICS & COLLISION
// ============================================================================
class Segment {
    constructor(x1, y1, x2, y2, isPad = false, multiplier = 1) {
        this.p1 = new Vec2(x1, y1);
        this.p2 = new Vec2(x2, y2);
        this.isPad = isPad;
        this.multiplier = multiplier;
    }
    
    // Line intersection
    intersect(p3, p4) {
        let x1=this.p1.x, y1=this.p1.y, x2=this.p2.x, y2=this.p2.y;
        let x3=p3.x, y3=p3.y, x4=p4.x, y4=p4.y;
        
        let den = (x1-x2)*(y3-y4) - (y1-y2)*(x3-x4);
        if(den === 0) return null;
        
        let t = ((x1-x3)*(y3-y4) - (y1-y3)*(x3-x4)) / den;
        let u = -((x1-x2)*(y1-y3) - (y1-y2)*(x1-x3)) / den;
        
        if(t >= 0 && t <= 1 && u >= 0 && u <= 1) {
            return new Vec2(x1 + t*(x2-x1), y1 + t*(y2-y1));
        }
        return null;
    }
}

// ============================================================================
// ENTITIES
// ============================================================================
class Particle {
    constructor(x, y, vx, vy, life) {
        this.pos = new Vec2(x, y);
        this.vel = new Vec2(vx, vy);
        this.life = life;
        this.maxLife = life;
    }
    update(dt) {
        this.pos.add(new Vec2(this.vel.x*dt, this.vel.y*dt));
        this.life -= dt;
    }
}

class Ship {
    constructor() {
        this.pos = new Vec2(100, 100);
        this.vel = new Vec2(1.5, 0);
        this.angle = Math.PI / 2; // Pointing right initially
        this.fuel = 1000;
        this.status = 'FLYING'; // FLYING, LANDED, CRASHED
        
        // Define ship vector geometry (local space)
        this.pts = [
            new Vec2(0, -6),   // Nose
            new Vec2(4, 4),    // Right wing
            new Vec2(3, 6),    // Right foot
            new Vec2(2, 4),    // Right engine inner
            new Vec2(-2, 4),   // Left engine inner
            new Vec2(-3, 6),   // Left foot
            new Vec2(-4, 4)    // Left wing
        ];
        
        this.flamePts = [
            new Vec2(-2, 4),
            new Vec2(0, 10),
            new Vec2(2, 4)
        ];
        
        this.worldPts = [];
        this.updateWorldPts();
    }
    
    reset(x, y) {
        this.pos.set(x, y);
        this.vel.set(1.5, 0);
        this.angle = Math.PI / 2;
        this.fuel = 1000;
        this.status = 'FLYING';
        this.updateWorldPts();
    }

    update(dt) {
        if(this.status !== 'FLYING') return;

        // Input application
        if(input.mapped.left && this.fuel > 0) {
            this.angle -= CONFIG.ROTATION_SPEED;
            this.fuel -= CONFIG.FUEL_CONSUMPTION * 0.1;
        }
        if(input.mapped.right && this.fuel > 0) {
            this.angle += CONFIG.ROTATION_SPEED;
            this.fuel -= CONFIG.FUEL_CONSUMPTION * 0.1;
        }
        
        let isThrusting = false;
        if(input.mapped.up && this.fuel > 0) {
            let thrustVec = new Vec2(0, -CONFIG.THRUST_POWER).rotate(this.angle);
            this.vel.add(thrustVec);
            this.fuel -= CONFIG.FUEL_CONSUMPTION;
            isThrusting = true;
            
            // Particles
            let ex = this.pos.x - Math.sin(this.angle)*4;
            let ey = this.pos.y + Math.cos(this.angle)*4;
            for(let i=0; i<2; i++) {
                game.particles.push(new Particle(
                    ex + MathUtils.rand(-1,1), 
                    ey + MathUtils.rand(-1,1), 
                    -this.vel.x + MathUtils.rand(-0.5,0.5), 
                    -this.vel.y + MathUtils.rand(0.5,1.5), 
                    MathUtils.rand(10, 30)
                ));
            }
        }
        
        // Engine audio
        if(isThrusting) audio.startThrust();
        else audio.stopThrust();

        // Gravity
        this.vel.y += CONFIG.GRAVITY;

        // Velocity integration
        this.pos.addScaled(this.vel, dt);
        
        // Wrap screen horizontally
        if(this.pos.x < 0) this.pos.x += CONFIG.VIEWPORT_WIDTH;
        if(this.pos.x > CONFIG.VIEWPORT_WIDTH) this.pos.x -= CONFIG.VIEWPORT_WIDTH;
        
        // Hard ceiling
        if(this.pos.y < 0) {
            this.pos.y = 0;
            this.vel.y = 0;
        }

        this.updateWorldPts();
    }
    
    updateWorldPts() {
        this.worldPts = this.pts.map(p => {
            let wp = p.copy().rotate(this.angle);
            return wp.add(this.pos);
        });
    }

    draw(ren) {
        if(this.status === 'CRASHED') return;
        
        ren.drawPoly(this.worldPts, true);
        
        // Draw thrust flame
        if(this.status === 'FLYING' && input.mapped.up && this.fuel > 0) {
            let flameW = this.flamePts.map(p => {
                let p2 = p.copy();
                if(p2.y > 4) p2.y = 4 + Math.random()*8; // flicker
                return p2.rotate(this.angle).add(this.pos);
            });
            ren.drawPoly(flameW, false);
        }
    }
}

class Terrain {
    constructor() {
        this.segments = [];
        this.generate();
    }
    
    generate() {
        this.segments = [];
        let points = [];
        const W = CONFIG.VIEWPORT_WIDTH;
        const H = CONFIG.VIEWPORT_HEIGHT;
        
        // Base profile setup
        points.push(new Vec2(0, H - 200));
        
        let curX = 0;
        let pCount = 0;
        
        // Hardcoded flat pads layout mixed with noise
        let padTargets = [
            { x: W*0.15, w: 40, mult: 2 },
            { x: W*0.5, w: 20, mult: 5 },
            { x: W*0.8, w: 60, mult: 1 }
        ];
        
        while(curX < W) {
            // Check if we need to draw a pad
            let makingPad = false;
            for(let i=0; i<padTargets.length; i++) {
                let t = padTargets[i];
                if(curX >= t.x && curX < t.x + t.w) {
                    let padY = points[points.length-1].y;
                    let padEndX = t.x + t.w;
                    points.push(new Vec2(padEndX, padY));
                    this.segments.push(new Segment(curX, padY, padEndX, padY, true, t.mult));
                    curX = padEndX;
                    makingPad = true;
                    padTargets.splice(i, 1);
                    break;
                }
            }
            
            if(!makingPad) {
                // Procedural jagged terrain
                let stepX = MathUtils.rand(10, 30);
                if(curX + stepX > W) stepX = W - curX;
                
                let lastY = points[points.length-1].y;
                let stepY = MathUtils.rand(-60, 60);
                
                // Force peaks and valleys
                if(lastY < H - 400) stepY = Math.abs(stepY); // Too high, go down
                if(lastY > H - 50) stepY = -Math.abs(stepY); // Too low, go up
                
                // Stepped/Quantized look (Classic Arcade)
                let nextX = curX + stepX;
                let nextY = lastY + stepY;
                
                // We do orthogonal steps instead of diagonals to match the reference image exactly
                let midX = curX;
                let midY = nextY;
                
                if(Math.random() > 0.5) {
                    midX = nextX;
                    midY = lastY;
                }
                
                // Create the two segments for the step
                points.push(new Vec2(midX, midY));
                this.segments.push(new Segment(curX, lastY, midX, midY, false));
                
                points.push(new Vec2(nextX, nextY));
                this.segments.push(new Segment(midX, midY, nextX, nextY, false));
                
                curX = nextX;
            }
        }
    }
    
    draw(ren) {
        for(let s of this.segments) {
            if(s.isPad) {
                // Thicker/brighter line for pads, or blinking
                if(Math.floor(Date.now() / 250) % 2 === 0) {
                    ren.ctx.lineWidth = CONFIG.VECTOR_THICKNESS * 2;
                }
                ren.drawLine(s.p1.x, s.p1.y, s.p2.x, s.p2.y);
                ren.ctx.lineWidth = CONFIG.VECTOR_THICKNESS;
                
                // Draw multiplier text under pad
                ren.drawText(s.multiplier + "X", s.p1.x + (s.p2.x-s.p1.x)/2, s.p1.y + 10, 0.8, 'center');
            } else {
                ren.drawLine(s.p1.x, s.p1.y, s.p2.x, s.p2.y);
            }
        }
    }
}

// ============================================================================
// GAME MANAGER
// ============================================================================
const STATE = {
    ATTRACT: 0,
    PLAYING: 1,
    LANDED: 2,
    CRASHED: 3,
    GAME_OVER: 4
};

class Game {
    constructor() {
        this.state = STATE.ATTRACT;
        this.ship = new Ship();
        this.terrain = new Terrain();
        this.particles = [];
        this.stars = [];
        
        this.score = 0;
        this.time = 0;
        this.lastTime = 0;
        this.stateTimer = 0;
        
        this.initStars();
    }
    
    initStars() {
        this.stars = [];
        for(let i=0; i<30; i++) {
            this.stars.push(new Vec2(
                MathUtils.rand(0, CONFIG.VIEWPORT_WIDTH),
                MathUtils.rand(0, CONFIG.VIEWPORT_HEIGHT/2)
            ));
        }
    }

    start() {
        this.score = 0;
        this.time = 0;
        this.startLevel();
    }
    
    startLevel() {
        this.terrain.generate();
        this.ship.reset(100, 100);
        this.particles = [];
        this.state = STATE.PLAYING;
    }

    update(dt) {
        // Star twinkling
        if(Math.random() < 0.1) this.stars[MathUtils.randInt(0, this.stars.length-1)].opacity = Math.random();

        // Particles
        for(let i=this.particles.length-1; i>=0; i--) {
            this.particles[i].update(dt);
            if(this.particles[i].life <= 0) this.particles.splice(i, 1);
        }

        if(this.state === STATE.ATTRACT) {
            // Fake AI / Demo mode
            if(Math.random()<0.02) input.mapped.up = !input.mapped.up;
            if(Math.random()<0.05) { input.mapped.left = true; input.mapped.right = false; }
            else if(Math.random()<0.05) { input.mapped.right = true; input.mapped.left = false; }
            else { input.mapped.left = false; input.mapped.right = false; }
            
            this.ship.update(dt);
            this.checkCollisions();
            
            if(this.ship.status !== 'FLYING') {
                setTimeout(() => { this.ship.reset(100,100); }, 2000);
            }
            
            if(input.mapped.start) this.start();
            return;
        }

        if(this.state === STATE.PLAYING) {
            this.time += dt / 60; // Approximate seconds
            this.ship.update(dt);
            this.checkCollisions();
            
            if(this.ship.fuel <= 0 && this.ship.vel.y > 0) {
                // Out of fuel, just falling
            }
        }
        
        if(this.state === STATE.CRASHED || this.state === STATE.LANDED) {
            this.stateTimer -= dt;
            if(this.stateTimer <= 0) {
                if(this.ship.fuel <= 0 && this.state === STATE.CRASHED) {
                    this.state = STATE.GAME_OVER;
                } else {
                    this.startLevel();
                }
            }
        }
        
        if(this.state === STATE.GAME_OVER) {
            if(input.mapped.start) {
                this.state = STATE.ATTRACT;
            }
        }
    }

    checkCollisions() {
        if(this.ship.status !== 'FLYING') return;

        let crashed = false;
        let landedOn = null;
        
        // Define bottom segment of ship for pad detection
        let shipBottom = [this.ship.worldPts[2], this.ship.worldPts[5]];

        // Broad phase: Check all ship lines against all terrain lines
        for(let i=0; i<this.ship.worldPts.length; i++) {
            let p1 = this.ship.worldPts[i];
            let p2 = this.ship.worldPts[(i+1)%this.ship.worldPts.length];
            
            for(let seg of this.terrain.segments) {
                let hit = seg.intersect(p1, p2);
                if(hit) {
                    // We hit something. Evaluate.
                    let speed = this.ship.vel.mag();
                    let isUpright = Math.abs(this.ship.angle % (Math.PI*2)) < CONFIG.MAX_SAFE_LANDING_ANGLE;
                    
                    // Specific check: Did the feet hit a pad?
                    let feetHit = false;
                    if(seg.isPad) {
                         let hitLeft = seg.intersect(this.ship.worldPts[4], this.ship.worldPts[5]); // left leg
                         let hitRight = seg.intersect(this.ship.worldPts[2], this.ship.worldPts[3]); // right leg
                         if(hitLeft || hitRight) feetHit = true;
                    }

                    if(seg.isPad && isUpright && speed <= CONFIG.MAX_SAFE_LANDING_SPEED && feetHit) {
                        landedOn = seg;
                    } else {
                        crashed = true;
                    }
                    break;
                }
            }
            if(crashed || landedOn) break;
        }

        if(crashed) {
            this.triggerCrash();
        } else if(landedOn) {
            this.triggerLand(landedOn);
        }
    }

    triggerCrash() {
        this.ship.status = 'CRASHED';
        this.state = STATE.CRASHED;
        this.stateTimer = 180; // 3 seconds at 60fps
        audio.stopThrust();
        audio.sfxCrash();
        
        // Explosion particles
        for(let i=0; i<40; i++) {
            this.particles.push(new Particle(
                this.ship.pos.x, this.ship.pos.y,
                MathUtils.rand(-3, 3), MathUtils.rand(-3, 3),
                MathUtils.rand(20, 80)
            ));
        }
        // Debris
        for(let i=0; i<6; i++) {
            this.particles.push(new Particle(
                this.ship.pos.x, this.ship.pos.y,
                MathUtils.rand(-1, 1), MathUtils.rand(-2, 0),
                MathUtils.rand(60, 120)
            ));
        }
    }

    triggerLand(pad) {
        this.ship.status = 'LANDED';
        this.state = STATE.LANDED;
        this.stateTimer = 180;
        
        // Snap to pad
        this.ship.vel.set(0,0);
        this.ship.angle = 0;
        this.ship.updateWorldPts();
        
        audio.stopThrust();
        audio.sfxLand();
        
        // Calculate score
        let points = 50 * pad.multiplier;
        if(this.ship.vel.y < 0.5) points += 50; // soft landing bonus
        
        this.score += points;
        
        // Award fuel
        this.ship.fuel = Math.min(1000, this.ship.fuel + 200);
        
        setTimeout(() => audio.sfxScore(), 500);
    }

    draw(ren) {
        ren.clear();
        ren.begin();

        // Stars
        for(let s of this.stars) {
            if(s.opacity === undefined) s.opacity = 1;
            if(Math.random() > 0.5) ren.drawDot(s.x, s.y);
        }

        this.terrain.draw(ren);
        this.ship.draw(ren);

        // Particles
        for(let p of this.particles) {
            ren.drawDot(p.pos.x, p.pos.y);
        }

        // --- HUD RENDERING ---
        
        // Top Left
        ren.drawText("SCORE " + MathUtils.padZero(this.score, 4), 20, 20, 1.5);
        
        let m = Math.floor(this.time / 60);
        let s = Math.floor(this.time % 60);
        ren.drawText("TIME  " + m + ":" + MathUtils.padZero(s, 2), 20, 45, 1.5);
        
        ren.drawText("FUEL  " + MathUtils.padZero(Math.floor(this.ship.fuel), 4), 20, 70, 1.5);

        // Top Right
        let alt = Math.max(0, CONFIG.VIEWPORT_HEIGHT - this.ship.pos.y - 150); // Rough altitude
        ren.drawText("ALTITUDE", CONFIG.VIEWPORT_WIDTH - 250, 20, 1.5);
        ren.drawText(MathUtils.padZero(Math.floor(alt), 4), CONFIG.VIEWPORT_WIDTH - 20, 20, 1.5, 'right');
        
        ren.drawText("HORIZONTAL SPEED", CONFIG.VIEWPORT_WIDTH - 250, 45, 1.5);
        ren.drawText(MathUtils.padZero(Math.floor(Math.abs(this.ship.vel.x * 100)), 4), CONFIG.VIEWPORT_WIDTH - 20, 45, 1.5, 'right');
        
        ren.drawText("VERTICAL SPEED", CONFIG.VIEWPORT_WIDTH - 250, 70, 1.5);
        ren.drawText(MathUtils.padZero(Math.floor(Math.abs(this.ship.vel.y * 100)), 4), CONFIG.VIEWPORT_WIDTH - 20, 70, 1.5, 'right');

        // State Overlays
        if(this.state === STATE.ATTRACT) {
            ren.drawText("PUSH START", CONFIG.VIEWPORT_WIDTH/2, 200, 2.5, 'center');
            ren.drawText("INSERT COIN", CONFIG.VIEWPORT_WIDTH/2, 250, 1.5, 'center');
        } else if (this.state === STATE.CRASHED) {
            ren.drawText("CONTACT IS LOST", CONFIG.VIEWPORT_WIDTH/2, 200, 2.5, 'center');
        } else if (this.state === STATE.LANDED) {
            ren.drawText("A PERFECT LANDING", CONFIG.VIEWPORT_WIDTH/2, 200, 2.5, 'center');
        } else if (this.state === STATE.GAME_OVER) {
            ren.drawText("GAME OVER", CONFIG.VIEWPORT_WIDTH/2, 200, 3.0, 'center');
        }

        // Bottom Footer
        ren.drawText("PART OF THE LUNAR TRAILS ART PROJECT", 20, CONFIG.VIEWPORT_HEIGHT - 20, 1.0);
        ren.drawText("SEB.LY", CONFIG.VIEWPORT_WIDTH - 20, CONFIG.VIEWPORT_HEIGHT - 20, 1.0, 'right');

        ren.end();
    }
}

// ============================================================================
// BOOTSTRAP & MAIN LOOP
// ============================================================================
const renderer = new VectorRenderer('game-canvas');
const input = new Input();
const audio = new AudioEngine();
const game = new Game();

let lastTime = 0;
function loop(timestamp) {
    if(!lastTime) lastTime = timestamp;
    let delta = timestamp - lastTime;
    
    // Cap delta to avoid spiral of death on tab switch
    if(delta > CONFIG.MAX_FRAME_TIME) delta = CONFIG.MAX_FRAME_TIME;
    lastTime = timestamp;
    
    // Fixed timestep logic (optional for pure retro, but good for physics)
    let steps = Math.floor(delta / (1000/CONFIG.FPS));
    if(steps === 0) steps = 1; // force at least one update
    
    for(let i=0; i<steps; i++) {
        game.update(1); // 1 unit of time per physics tick
    }
    
    game.draw(renderer);
    requestAnimationFrame(loop);
}

// Start
requestAnimationFrame(loop);

</script>

    PHYSICS_TIMESTEP: 1000 / 60,
    MAX_FRAME_TIME: 250,
    VECTOR_THICKNESS: 1.5,

};

// ============================================================================
// VECTOR MATH LIBRARY
// ============================================================================
class Vec2 {
    constructor(x = 0, y = 0) { this.x = x; this.y = y; }
    set(x, y) { this.x = x; this.y = y; return this; }
    copy() { return new Vec2(this.x, this.y); }
    add(v) { this.x += v.x; this.y += v.y; return this; }
    addScaled(v, s) { this.x += v.x * s; this.y += v.y * s; return this; }
    sub(v) { this.x -= v.x; this.y -= v.y; return this; }
    mult(s) { this.x *= s; this.y *= s; return this; }
    div(s) { if(s!==0){this.x /= s; this.y /= s;} return this; }
    magSq() { return this.x * this.x + this.y * this.y; }
    mag() { return Math.sqrt(this.magSq()); }
    normalize() { let m = this.mag(); if(m>0) this.div(m); return this; }
    dot(v) { return this.x * v.x + this.y * v.y; }
    cross(v) { return this.x * v.y - this.y * v.x; }
    dist(v) { let dx = this.x - v.x, dy = this.y - v.y; return Math.sqrt(dx*dx + dy*dy); }
    rotate(angle) {
        let c = Math.cos(angle), s = Math.sin(angle);
        let nx = this.x * c - this.y * s;
        let ny = this.x * s + this.y * c;
        this.x = nx; this.y = ny;
        return this;
    }
}

const MathUtils = {
    rand: (min, max) => Math.random() * (max - min) + min,
    randInt: (min, max) => Math.floor(Math.random() * (max - min + 1)) + min,
    clamp: (val, min, max) => Math.max(min, Math.min(max, val)),
    lerp: (a, b, t) => a + (b - a) * t,
    padZero: (num, size) => { let s = num+""; while (s.length < size) s = "0" + s; return s; }
};

// ============================================================================

};

class VectorRenderer {
    constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        this.width = 0;
        this.height = 0;
        this.resize();
        window.addEventListener('resize', () => this.resize());
    }

    resize() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        // Calculate scaling to keep aspect ratio authentic
        let scaleX = this.width / CONFIG.VIEWPORT_WIDTH;
        let scaleY = this.height / CONFIG.VIEWPORT_HEIGHT;
        CONFIG.SCALE_FACTOR = Math.min(scaleX, scaleY);
    }

    clear() {
        this.ctx.fillStyle = CONFIG.COLOR_BG;
        this.ctx.fillRect(0, 0, this.width, this.height);
    }

    begin() {
        this.ctx.save();
        // Center the viewport
        let offsetX = (this.width - (CONFIG.VIEWPORT_WIDTH * CONFIG.SCALE_FACTOR)) / 2;
        let offsetY = (this.height - (CONFIG.VIEWPORT_HEIGHT * CONFIG.SCALE_FACTOR)) / 2;
        this.ctx.translate(offsetX, offsetY);
        this.ctx.scale(CONFIG.SCALE_FACTOR, CONFIG.SCALE_FACTOR);
        
        // Setup CRT Vector Line Style
        this.ctx.strokeStyle = CONFIG.COLOR_DRAW;
        this.ctx.lineWidth = CONFIG.VECTOR_THICKNESS;
        this.ctx.lineCap = 'round';
        this.ctx.lineJoin = 'round';
        this.ctx.shadowBlur = CONFIG.GLOW_INTENSITY;
        this.ctx.shadowColor = CONFIG.COLOR_DRAW;
    }

    end() {
        this.ctx.restore();
    }

    drawLine(x1, y1, x2, y2) {
        this.ctx.beginPath();
        this.ctx.moveTo(x1, y1);
        this.ctx.lineTo(x2, y2);
        this.ctx.stroke();
    }

    drawPoly(pts, closed = false) {
        if(pts.length < 2) return;
        this.ctx.beginPath();
        this.ctx.moveTo(pts[0].x, pts[0].y);
        for(let i=1; i<pts.length; i++) {
            this.ctx.lineTo(pts[i].x, pts[i].y);
        }
        if(closed) this.ctx.closePath();
        this.ctx.stroke();
    }

    drawText(str, x, y, scale = 1, align = 'left') {
        const charWidth = 10 * scale;
        const charSpacing = 4 * scale;
        let totalWidth = 0;
        
        if (align === 'right') {
            totalWidth = (str.length * charWidth) + ((str.length - 1) * charSpacing);
            x -= totalWidth;
        } else if (align === 'center') {
            totalWidth = (str.length * charWidth) + ((str.length - 1) * charSpacing);
            x -= totalWidth / 2;
        }

        this.ctx.beginPath();
        for (let i = 0; i < str.length; i++) {
            let char = str[i].toUpperCase();
            let data = VECTOR_FONT[char];
            if (data) {
                let cx = x + (i * (charWidth + charSpacing));
                for (let j = 0; j < data.length; j++) {
                    let line = data[j];
                    this.ctx.moveTo(cx + line[0] * scale, y + line[1] * scale);
                    this.ctx.lineTo(cx + line[2] * scale, y + line[3] * scale);
                }
            }
        }
        this.ctx.stroke();
    }
    
    drawDot(x, y) {
        this.ctx.fillStyle = CONFIG.COLOR_DRAW;
        this.ctx.fillRect(x - 1, y - 1, 2, 2);
    }
}

// ============================================================================
// AUDIO SYNTHESIZER (Pure WebAudio API)
// ============================================================================
class AudioEngine {
    constructor() {
        this.ctx = null;
        this.master = null;
        this.initialized = false;
        this.thrustOsc = null;
        this.thrustGain = null;
    }

    init() {
        if(this.initialized) return;
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AudioContext();
            this.master = this.ctx.createGain();
            this.master.gain.value = 0.3;
            
            // Retro compression
            const comp = this.ctx.createDynamicsCompressor();
            comp.threshold.value = -20;
            comp.knee.value = 10;
            comp.ratio.value = 12;
            comp.attack.value = 0;
            comp.release.value = 0.25;
            
            this.master.connect(comp);
            comp.connect(this.ctx.destination);
            this.initialized = true;
        } catch(e) {}
    }

    playTone(freq, type, duration, vol=1.0) {
        if(!this.initialized || this.ctx.state === 'suspended') return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.master);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }

    playNoise(duration, vol=1.0, lowpassFreq=1000) {
        if(!this.initialized || this.ctx.state === 'suspended') return;
        let bufferSize = this.ctx.sampleRate * duration;
        let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        let noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        let filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = lowpassFreq;
        let gain = this.ctx.createGain();
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.master);
        noise.start();
    }

    startThrust() {
        if(!this.initialized || this.thrustOsc) return;
        this.thrustOsc = this.ctx.createOscillator();
        this.thrustOsc.type = 'sawtooth';
        this.thrustOsc.frequency.value = 40;
        this.thrustGain = this.ctx.createGain();
        this.thrustGain.gain.value = 0;
        
        let filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 300;
        
        this.thrustOsc.connect(filter);
        filter.connect(this.thrustGain);
        this.thrustGain.connect(this.master);
        
        this.thrustOsc.start();
        this.thrustGain.gain.setTargetAtTime(0.8, this.ctx.currentTime, 0.05);
    }

    stopThrust() {
        if(!this.thrustOsc) return;
        this.thrustGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.05);
        setTimeout(() => {
            if(this.thrustOsc) {
                this.thrustOsc.stop();
                this.thrustOsc.disconnect();
                this.thrustOsc = null;
            }
        }, 100);
    }

    sfxThrust() { this.playNoise(0.1, 0.2, 400); }
    sfxCrash() { 
        this.playNoise(1.5, 1.0, 800); 
        this.playTone(50, 'square', 1.0, 0.8);
        this.playTone(30, 'sawtooth', 1.5, 1.0);
    }
    sfxLand() { 
        this.playTone(400, 'sine', 0.2, 0.3);
        setTimeout(()=>this.playTone(600, 'sine', 0.4, 0.3), 150);
    }
    sfxAlert() { this.playTone(800, 'square', 0.1, 0.2); }
    sfxScore() { this.playTone(1200, 'square', 0.05, 0.1); }
}

// ============================================================================
// INPUT HANDLING
// ============================================================================
class Input {
    constructor() {
        this.keys = {};
        this.mapped = { up: false, left: false, right: false, start: false };
        
        window.addEventListener('keydown', e => {
            this.keys[e.code] = true;
            this.updateMap();
            audio.init();
        });
        window.addEventListener('keyup', e => {
            this.keys[e.code] = false;
            this.updateMap();
        });
        
        // Touch controls
        window.addEventListener('touchstart', e => {
            audio.init();
            for(let i=0; i<e.touches.length; i++) {
                let t = e.touches[i];
                if(t.clientY < window.innerHeight/2) this.mapped.start = true;
                if(t.clientY > window.innerHeight/2) {
                    if(t.clientX < window.innerWidth/3) this.mapped.left = true;
                    else if(t.clientX > window.innerWidth*2/3) this.mapped.right = true;
                    else this.mapped.up = true;
                }
            }
        });
        window.addEventListener('touchend', e => {
            this.mapped.up = this.mapped.left = this.mapped.right = this.mapped.start = false;
            for(let i=0; i<e.touches.length; i++) {
                let t = e.touches[i];
                if(t.clientY < window.innerHeight/2) this.mapped.start = true;
                if(t.clientY > window.innerHeight/2) {
                    if(t.clientX < window.innerWidth/3) this.mapped.left = true;
                    else if(t.clientX > window.innerWidth*2/3) this.mapped.right = true;
                    else this.mapped.up = true;
                }
            }
        });
    }
    
    updateMap() {
        this.mapped.up = this.keys['ArrowUp'] || this.keys['KeyW'] || this.keys['Space'];
        this.mapped.left = this.keys['ArrowLeft'] || this.keys['KeyA'];
        this.mapped.right = this.keys['ArrowRight'] || this.keys['KeyD'];
        this.mapped.start = this.keys['Enter'] || this.keys['Space'];
    }
}

// ============================================================================
// PHYSICS & COLLISION
// ============================================================================
class Segment {
    constructor(x1, y1, x2, y2, isPad = false, multiplier = 1) {
        this.p1 = new Vec2(x1, y1);
        this.p2 = new Vec2(x2, y2);
        this.isPad = isPad;
        this.multiplier = multiplier;
    }
    
    // Line intersection
    intersect(p3, p4) {
        let x1=this.p1.x, y1=this.p1.y, x2=this.p2.x, y2=this.p2.y;
        let x3=p3.x, y3=p3.y, x4=p4.x, y4=p4.y;
        
        let den = (x1-x2)*(y3-y4) - (y1-y2)*(x3-x4);
        if(den === 0) return null;
        
        let t = ((x1-x3)*(y3-y4) - (y1-y3)*(x3-x4)) / den;
        let u = -((x1-x2)*(y1-y3) - (y1-y2)*(x1-x3)) / den;
        
        if(t >= 0 && t <= 1 && u >= 0 && u <= 1) {
            return new Vec2(x1 + t*(x2-x1), y1 + t*(y2-y1));
        }
        return null;
    }
}

// ============================================================================
// ENTITIES
// ============================================================================
class Particle {
    constructor(x, y, vx, vy, life) {
        this.pos = new Vec2(x, y);
        this.vel = new Vec2(vx, vy);
        this.life = life;
        this.maxLife = life;
    }
    update(dt) {
        this.pos.add(new Vec2(this.vel.x*dt, this.vel.y*dt));
        this.life -= dt;
    }
}

class Ship {
    constructor() {
        this.pos = new Vec2(100, 100);
        this.vel = new Vec2(1.5, 0);
        this.angle = Math.PI / 2; // Pointing right initially
        this.fuel = 1000;
        this.status = 'FLYING'; // FLYING, LANDED, CRASHED
        
        // Define ship vector geometry (local space)
        this.pts = [
            new Vec2(0, -6),   // Nose
            new Vec2(4, 4),    // Right wing
            new Vec2(3, 6),    // Right foot
            new Vec2(2, 4),    // Right engine inner
            new Vec2(-2, 4),   // Left engine inner
            new Vec2(-3, 6),   // Left foot
            new Vec2(-4, 4)    // Left wing
        ];
        
        this.flamePts = [
            new Vec2(-2, 4),
            new Vec2(0, 10),
            new Vec2(2, 4)
        ];
        
        this.worldPts = [];
        this.updateWorldPts();
    }
    
    reset(x, y) {
        this.pos.set(x, y);
        this.vel.set(1.5, 0);
        this.angle = Math.PI / 2;
        this.fuel = 1000;
        this.status = 'FLYING';
        this.updateWorldPts();
    }

    update(dt) {
        if(this.status !== 'FLYING') return;

        // Input application
        if(input.mapped.left && this.fuel > 0) {
            this.angle -= CONFIG.ROTATION_SPEED;
            this.fuel -= CONFIG.FUEL_CONSUMPTION * 0.1;
        }
        if(input.mapped.right && this.fuel > 0) {
            this.angle += CONFIG.ROTATION_SPEED;
            this.fuel -= CONFIG.FUEL_CONSUMPTION * 0.1;
        }
        
        let isThrusting = false;
        if(input.mapped.up && this.fuel > 0) {
            let thrustVec = new Vec2(0, -CONFIG.THRUST_POWER).rotate(this.angle);
            this.vel.add(thrustVec);
            this.fuel -= CONFIG.FUEL_CONSUMPTION;
            isThrusting = true;
            
            // Particles
            let ex = this.pos.x - Math.sin(this.angle)*4;
            let ey = this.pos.y + Math.cos(this.angle)*4;
            for(let i=0; i<2; i++) {
                game.particles.push(new Particle(
                    ex + MathUtils.rand(-1,1), 
                    ey + MathUtils.rand(-1,1), 
                    -this.vel.x + MathUtils.rand(-0.5,0.5), 
                    -this.vel.y + MathUtils.rand(0.5,1.5), 
                    MathUtils.rand(10, 30)
                ));
            }
        }
        
        // Engine audio
        if(isThrusting) audio.startThrust();
        else audio.stopThrust();

        // Gravity
        this.vel.y += CONFIG.GRAVITY;

        // Velocity integration
        this.pos.addScaled(this.vel, dt);
        
        // Wrap screen horizontally
        if(this.pos.x < 0) this.pos.x += CONFIG.VIEWPORT_WIDTH;
        if(this.pos.x > CONFIG.VIEWPORT_WIDTH) this.pos.x -= CONFIG.VIEWPORT_WIDTH;
        
        // Hard ceiling
        if(this.pos.y < 0) {
            this.pos.y = 0;
            this.vel.y = 0;
        }

        this.updateWorldPts();
    }
    
    updateWorldPts() {
        this.worldPts = this.pts.map(p => {
            let wp = p.copy().rotate(this.angle);
            return wp.add(this.pos);
        });
    }

    draw(ren) {
        if(this.status === 'CRASHED') return;
        
        ren.drawPoly(this.worldPts, true);
        
        // Draw thrust flame
        if(this.status === 'FLYING' && input.mapped.up && this.fuel > 0) {
            let flameW = this.flamePts.map(p => {
                let p2 = p.copy();
                if(p2.y > 4) p2.y = 4 + Math.random()*8; // flicker
                return p2.rotate(this.angle).add(this.pos);
            });
            ren.drawPoly(flameW, false);
        }
    }
}

class Terrain {
    constructor() {
        this.segments = [];
        this.generate();
    }
    
    generate() {
        this.segments = [];
        let points = [];
        const W = CONFIG.VIEWPORT_WIDTH;
        const H = CONFIG.VIEWPORT_HEIGHT;
        
        // Base profile setup
        points.push(new Vec2(0, H - 200));
        
        let curX = 0;
        let pCount = 0;
        
        // Hardcoded flat pads layout mixed with noise
        let padTargets = [
            { x: W*0.15, w: 40, mult: 2 },
            { x: W*0.5, w: 20, mult: 5 },
            { x: W*0.8, w: 60, mult: 1 }
        ];
        
        while(curX < W) {
            // Check if we need to draw a pad
            let makingPad = false;
            for(let i=0; i<padTargets.length; i++) {
                let t = padTargets[i];
                if(curX >= t.x && curX < t.x + t.w) {
                    let padY = points[points.length-1].y;
                    let padEndX = t.x + t.w;
                    points.push(new Vec2(padEndX, padY));
                    this.segments.push(new Segment(curX, padY, padEndX, padY, true, t.mult));
                    curX = padEndX;
                    makingPad = true;
                    padTargets.splice(i, 1);
                    break;
                }
            }
            
            if(!makingPad) {
                // Procedural jagged terrain
                let stepX = MathUtils.rand(10, 30);
                if(curX + stepX > W) stepX = W - curX;
                
                let lastY = points[points.length-1].y;
                let stepY = MathUtils.rand(-60, 60);
                
                // Force peaks and valleys
                if(lastY < H - 400) stepY = Math.abs(stepY); // Too high, go down
                if(lastY > H - 50) stepY = -Math.abs(stepY); // Too low, go up
                
                // Stepped/Quantized look (Classic Arcade)
                let nextX = curX + stepX;
                let nextY = lastY + stepY;
                
                // We do orthogonal steps instead of diagonals to match the reference image exactly
                let midX = curX;
                let midY = nextY;
                
                if(Math.random() > 0.5) {
                    midX = nextX;
                    midY = lastY;
                }
                
                // Create the two segments for the step
                points.push(new Vec2(midX, midY));
                this.segments.push(new Segment(curX, lastY, midX, midY, false));
                
                points.push(new Vec2(nextX, nextY));
                this.segments.push(new Segment(midX, midY, nextX, nextY, false));
                
                curX = nextX;
            }
        }
    }
    
    draw(ren) {
        for(let s of this.segments) {
            if(s.isPad) {
                // Thicker/brighter line for pads, or blinking
                if(Math.floor(Date.now() / 250) % 2 === 0) {
                    ren.ctx.lineWidth = CONFIG.VECTOR_THICKNESS * 2;
                }
                ren.drawLine(s.p1.x, s.p1.y, s.p2.x, s.p2.y);
                ren.ctx.lineWidth = CONFIG.VECTOR_THICKNESS;
                
                // Draw multiplier text under pad
                ren.drawText(s.multiplier + "X", s.p1.x + (s.p2.x-s.p1.x)/2, s.p1.y + 10, 0.8, 'center');
            } else {
                ren.drawLine(s.p1.x, s.p1.y, s.p2.x, s.p2.y);
            }
        }
    }
}

// ============================================================================
// GAME MANAGER
// ============================================================================
const STATE = {
    ATTRACT: 0,
    PLAYING: 1,
    LANDED: 2,
    CRASHED: 3,
    GAME_OVER: 4
};

class Game {
    constructor() {
        this.state = STATE.ATTRACT;
        this.ship = new Ship();
        this.terrain = new Terrain();
        this.particles = [];
        this.stars = [];
        
        this.score = 0;
        this.time = 0;
        this.lastTime = 0;
        this.stateTimer = 0;
        
        this.initStars();
    }
    
    initStars() {
        this.stars = [];
        for(let i=0; i<30; i++) {
            this.stars.push(new Vec2(
                MathUtils.rand(0, CONFIG.VIEWPORT_WIDTH),
                MathUtils.rand(0, CONFIG.VIEWPORT_HEIGHT/2)
            ));
        }
    }

    start() {
        this.score = 0;
        this.time = 0;
        this.startLevel();
    }
    
    startLevel() {
        this.terrain.generate();
        this.ship.reset(100, 100);
        this.particles = [];
        this.state = STATE.PLAYING;
    }

    update(dt) {
        // Star twinkling
        if(Math.random() < 0.1) this.stars[MathUtils.randInt(0, this.stars.length-1)].opacity = Math.random();

        // Particles
        for(let i=this.particles.length-1; i>=0; i--) {
            this.particles[i].update(dt);
            if(this.particles[i].life <= 0) this.particles.splice(i, 1);
        }

        if(this.state === STATE.ATTRACT) {
            // Fake AI / Demo mode
            if(Math.random()<0.02) input.mapped.up = !input.mapped.up;
            if(Math.random()<0.05) { input.mapped.left = true; input.mapped.right = false; }
            else if(Math.random()<0.05) { input.mapped.right = true; input.mapped.left = false; }
            else { input.mapped.left = false; input.mapped.right = false; }
            
            this.ship.update(dt);
            this.checkCollisions();
            
            if(this.ship.status !== 'FLYING') {
                setTimeout(() => { this.ship.reset(100,100); }, 2000);
            }
            
            if(input.mapped.start) this.start();
            return;
        }

        if(this.state === STATE.PLAYING) {
            this.time += dt / 60; // Approximate seconds
            this.ship.update(dt);
            this.checkCollisions();
            
            if(this.ship.fuel <= 0 && this.ship.vel.y > 0) {
                // Out of fuel, just falling
            }
        }
        
        if(this.state === STATE.CRASHED || this.state === STATE.LANDED) {
            this.stateTimer -= dt;
            if(this.stateTimer <= 0) {
                if(this.ship.fuel <= 0 && this.state === STATE.CRASHED) {
                    this.state = STATE.GAME_OVER;
                } else {
                    this.startLevel();
                }
            }
        }
        
        if(this.state === STATE.GAME_OVER) {
            if(input.mapped.start) {
                this.state = STATE.ATTRACT;
            }
        }
    }

    checkCollisions() {
        if(this.ship.status !== 'FLYING') return;

        let crashed = false;
        let landedOn = null;
        
        // Define bottom segment of ship for pad detection
        let shipBottom = [this.ship.worldPts[2], this.ship.worldPts[5]];

        // Broad phase: Check all ship lines against all terrain lines
        for(let i=0; i<this.ship.worldPts.length; i++) {
            let p1 = this.ship.worldPts[i];
            let p2 = this.ship.worldPts[(i+1)%this.ship.worldPts.length];
            
            for(let seg of this.terrain.segments) {
                let hit = seg.intersect(p1, p2);
                if(hit) {
                    // We hit something. Evaluate.
                    let speed = this.ship.vel.mag();
                    let isUpright = Math.abs(this.ship.angle % (Math.PI*2)) < CONFIG.MAX_SAFE_LANDING_ANGLE;
                    
                    // Specific check: Did the feet hit a pad?
                    let feetHit = false;
                    if(seg.isPad) {
                         let hitLeft = seg.intersect(this.ship.worldPts[4], this.ship.worldPts[5]); // left leg
                         let hitRight = seg.intersect(this.ship.worldPts[2], this.ship.worldPts[3]); // right leg
                         if(hitLeft || hitRight) feetHit = true;
                    }

                    if(seg.isPad && isUpright && speed <= CONFIG.MAX_SAFE_LANDING_SPEED && feetHit) {
                        landedOn = seg;
                    } else {
                        crashed = true;
                    }
                    break;
                }
            }
            if(crashed || landedOn) break;
        }

        if(crashed) {
            this.triggerCrash();
        } else if(landedOn) {
            this.triggerLand(landedOn);
        }
    }

    triggerCrash() {
        this.ship.status = 'CRASHED';
        this.state = STATE.CRASHED;
        this.stateTimer = 180; // 3 seconds at 60fps
        audio.stopThrust();
        audio.sfxCrash();
        
        // Explosion particles
        for(let i=0; i<40; i++) {
            this.particles.push(new Particle(
                this.ship.pos.x, this.ship.pos.y,
                MathUtils.rand(-3, 3), MathUtils.rand(-3, 3),
                MathUtils.rand(20, 80)
            ));
        }
        // Debris
        for(let i=0; i<6; i++) {
            this.particles.push(new Particle(
                this.ship.pos.x, this.ship.pos.y,
                MathUtils.rand(-1, 1), MathUtils.rand(-2, 0),
                MathUtils.rand(60, 120)
            ));
        }
    }

    triggerLand(pad) {
        this.ship.status = 'LANDED';
        this.state = STATE.LANDED;
        this.stateTimer = 180;
        
        // Snap to pad
        this.ship.vel.set(0,0);
        this.ship.angle = 0;
        this.ship.updateWorldPts();
        
        audio.stopThrust();
        audio.sfxLand();
        
        // Calculate score
        let points = 50 * pad.multiplier;
        if(this.ship.vel.y < 0.5) points += 50; // soft landing bonus
        
        this.score += points;
        
        // Award fuel
        this.ship.fuel = Math.min(1000, this.ship.fuel + 200);
        
        setTimeout(() => audio.sfxScore(), 500);
    }

    draw(ren) {
        ren.clear();
        ren.begin();

        // Stars
        for(let s of this.stars) {
            if(s.opacity === undefined) s.opacity = 1;
            if(Math.random() > 0.5) ren.drawDot(s.x, s.y);
        }

        this.terrain.draw(ren);
        this.ship.draw(ren);

        // Particles
        for(let p of this.particles) {
            ren.drawDot(p.pos.x, p.pos.y);
        }

        // --- HUD RENDERING ---
        
        // Top Left
        ren.drawText("SCORE " + MathUtils.padZero(this.score, 4), 20, 20, 1.5);
        
        let m = Math.floor(this.time / 60);
        let s = Math.floor(this.time % 60);
        ren.drawText("TIME  " + m + ":" + MathUtils.padZero(s, 2), 20, 45, 1.5);
        
        ren.drawText("FUEL  " + MathUtils.padZero(Math.floor(this.ship.fuel), 4), 20, 70, 1.5);

        // Top Right
        let alt = Math.max(0, CONFIG.VIEWPORT_HEIGHT - this.ship.pos.y - 150); // Rough altitude
        ren.drawText("ALTITUDE", CONFIG.VIEWPORT_WIDTH - 250, 20, 1.5);
        ren.drawText(MathUtils.padZero(Math.floor(alt), 4), CONFIG.VIEWPORT_WIDTH - 20, 20, 1.5, 'right');
        
        ren.drawText("HORIZONTAL SPEED", CONFIG.VIEWPORT_WIDTH - 250, 45, 1.5);
        ren.drawText(MathUtils.padZero(Math.floor(Math.abs(this.ship.vel.x * 100)), 4), CONFIG.VIEWPORT_WIDTH - 20, 45, 1.5, 'right');
        
        ren.drawText("VERTICAL SPEED", CONFIG.VIEWPORT_WIDTH - 250, 70, 1.5);
        ren.drawText(MathUtils.padZero(Math.floor(Math.abs(this.ship.vel.y * 100)), 4), CONFIG.VIEWPORT_WIDTH - 20, 70, 1.5, 'right');

        // State Overlays
        if(this.state === STATE.ATTRACT) {
            ren.drawText("PUSH START", CONFIG.VIEWPORT_WIDTH/2, 200, 2.5, 'center');
            ren.drawText("INSERT COIN", CONFIG.VIEWPORT_WIDTH/2, 250, 1.5, 'center');
        } else if (this.state === STATE.CRASHED) {
            ren.drawText("CONTACT IS LOST", CONFIG.VIEWPORT_WIDTH/2, 200, 2.5, 'center');
        } else if (this.state === STATE.LANDED) {
            ren.drawText("A PERFECT LANDING", CONFIG.VIEWPORT_WIDTH/2, 200, 2.5, 'center');
        } else if (this.state === STATE.GAME_OVER) {
            ren.drawText("GAME OVER", CONFIG.VIEWPORT_WIDTH/2, 200, 3.0, 'center');
        }

        // Bottom Footer
        ren.drawText("PART OF THE LUNAR TRAILS ART PROJECT", 20, CONFIG.VIEWPORT_HEIGHT - 20, 1.0);
        ren.drawText("SEB.LY", CONFIG.VIEWPORT_WIDTH - 20, CONFIG.VIEWPORT_HEIGHT - 20, 1.0, 'right');

        ren.end();
    }
}

// ============================================================================
// BOOTSTRAP & MAIN LOOP
// ============================================================================
const renderer = new VectorRenderer('game-canvas');
const input = new Input();
const audio = new AudioEngine();
const game = new Game();

let lastTime = 0;
function loop(timestamp) {
    if(!lastTime) lastTime = timestamp;
    let delta = timestamp - lastTime;
    
    // Cap delta to avoid spiral of death on tab switch
    if(delta > CONFIG.MAX_FRAME_TIME) delta = CONFIG.MAX_FRAME_TIME;
    lastTime = timestamp;
    
    // Fixed timestep logic (optional for pure retro, but good for physics)
    let steps = Math.floor(delta / (1000/CONFIG.FPS));
    if(steps === 0) steps = 1; // force at least one update
    
    for(let i=0; i<steps; i++) {
        game.update(1); // 1 unit of time per physics tick
    }
    
    game.draw(renderer);
    requestAnimationFrame(loop);
}

// Start
requestAnimationFrame(loop);

</script>
